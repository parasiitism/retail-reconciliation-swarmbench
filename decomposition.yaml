  - id: synthesize_reconciled_report
    description: >
      Read all map outputs, verify that every store file and every transaction
      ID has been covered, remove duplicate transaction IDs by alphabetical
      filename and row order, reconcile category totals using the catalog,
      compute global totals, sort arrays, and write the final JSON report to
      /logs/agent/output.json.
    depends_on:
      - inspect_catalog_and_schema
      - analyze_atlanta
      - analyze_boston
      - analyze_chicago
      - analyze_denver
      - analyze_el_paso
      - analyze_fresno
      - analyze_grand_rapids
      - analyze_houston
      - analyze_indianapolis
      - analyze_jackson
    parallel_group: reduce
