coordination_pattern: map-reduce

sub_tasks:
  - id: inspect_catalog_and_schema
    description: >
      Inspect /input_artifacts/products.csv and the headers of all store CSVs.
      Produce the catalog mapping, the complete set of store filenames, and the
      column-name normalization table needed by the reducer. Do not compute the
      final answer.
    depends_on: []
    parallel_group: map

  - id: analyze_atlanta
    description: >
      Analyze /input_artifacts/stores/atlanta.csv only. Normalize its schema,
      identify refunds and unmapped SKUs in that file, calculate store-level
      candidate totals before cross-file duplicate removal, and list all
      transaction IDs with row positions for duplicate reconciliation.
    depends_on: []
    parallel_group: map

  - id: analyze_boston
